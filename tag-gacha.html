<title>タグガチャ</title>
<style>
:root{
  --ink:#0f1420; --ink2:#161c2a; --ink3:#1e2435; --ink4:#272e43;
  --rule:#2c3448; --rule2:#3d4763;
  --txt:#e7eaf1; --dim:#8b93a7; --dim2:#5d6478;
  --tag:#4fb3f0; --tagbg:#12293c;
  --brass:#d9a441; --brassd:#3a2f16;
  --ng:#e0574f; --ngbg:#33191a;
  --link:#52b788; --linkbg:#122b23;
  --mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--ink);color:var(--txt);
  font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans",-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  font-size:14px;line-height:1.5;
  padding-bottom:env(safe-area-inset-bottom);
  -webkit-text-size-adjust:100%;
}
button{font:inherit;cursor:pointer;border:0;background:none;color:inherit}
input,textarea,select{font:inherit}
.wrap{max-width:760px;margin:0 auto;padding:0 12px}

header{position:sticky;top:0;z-index:30;background:var(--ink);border-bottom:1px solid var(--rule);padding-top:env(safe-area-inset-top)}
.hrow{display:flex;align-items:center;gap:12px;padding:14px 16px 8px}
.bar{width:5px;height:30px;background:var(--brass);border-radius:3px;flex:none}
.ttl{font-size:17px;font-weight:800;letter-spacing:.06em}
.sub{font-size:9px;color:var(--dim2);letter-spacing:.22em;font-weight:700}
.stat{font-family:var(--mono);font-size:10px;color:var(--dim2);text-align:right;line-height:1.5;flex:none}
.stat b{color:var(--tag);font-weight:400}
.save{border:1px solid var(--brass);color:var(--brass);border-radius:8px;padding:7px 9px;flex:none;font-size:12px;font-weight:700}
.save.on{background:var(--brass);color:#241c08}
nav{display:flex;gap:4px;padding:0 8px 6px;overflow-x:auto;-webkit-overflow-scrolling:touch}
nav button{flex:none;font-size:12px;font-weight:700;color:var(--dim2);border-radius:8px;padding:8px 12px;border:1px solid transparent}
nav button.sel{background:var(--brass);color:#241c08;border-color:var(--brass)}

main{padding:12px 0 40px;display:flex;flex-direction:column;gap:12px}
.card{background:var(--ink2);border:1px solid var(--rule);border-radius:12px}
.card.hi{border-color:var(--brass)}
.pad{padding:14px 16px}
.eb{font-size:10px;letter-spacing:.18em;font-weight:700;color:var(--dim2);margin-bottom:5px}
.row{display:flex;align-items:center;gap:8px}
.col{display:flex;flex-direction:column;gap:10px}
.sp{flex:1}
.muted{color:var(--dim);font-size:11px;line-height:1.8}
.mini{color:var(--dim2);font-size:10.5px;line-height:1.7}
.mono{font-family:var(--mono)}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;border-radius:8px;padding:9px 12px;font-size:13px;font-weight:700;border:1px solid var(--rule);color:var(--dim)}
.btn.full{width:100%}
.btn.solid{background:var(--ink4);color:var(--txt);border-color:var(--rule2)}
.btn.lever{background:var(--brass);color:#241c08;border-color:var(--brass)}
.btn.ng{background:var(--ngbg);color:var(--ng);border-color:var(--ng)}
.btn[disabled]{opacity:.35;pointer-events:none}
.btn.lg{padding:15px;font-size:15px}

input[type=text],input[type=number],textarea,select{
  width:100%;background:var(--ink);color:var(--txt);border:1px solid var(--rule);
  border-radius:8px;padding:9px 11px;font-size:14px;outline:none;appearance:none;
}
textarea{font-family:var(--mono);font-size:12px;color:var(--tag);resize:vertical}
select{padding:7px 9px;font-size:13px;width:auto}
input[type=number]{width:74px}
input[type=file]{color:var(--dim);font-size:12px;padding:8px}

.sw{width:38px;height:21px;border-radius:99px;background:var(--ink4);border:1px solid var(--rule2);position:relative;flex:none}
.sw.on{background:var(--brass);border-color:var(--brass)}
.sw i{position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:99px;background:var(--dim);transition:left .13s}
.sw.on i{left:19px;background:#241c08}

.chips{display:flex;flex-wrap:wrap;gap:5px}
.chip{display:inline-flex;align-items:center;gap:5px;background:var(--tagbg);border:1px solid var(--rule);border-radius:6px;padding:3px 7px;font-family:var(--mono);font-size:12px;color:var(--tag)}
.chip .ja{font-family:inherit;font-size:10px;color:var(--dim2)}
.chip.off{opacity:.4;background:var(--ink3);color:var(--dim2)}
.chip.fix{background:var(--brassd);border-color:var(--brass);color:var(--brass)}
.chip .x{color:var(--dim2);padding:0 2px;font-size:14px;line-height:1}
.pin::before{content:"📌";font-size:9px;margin-right:1px}
.chip{padding:2px 4px 2px 2px}
.chip .cy{color:var(--dim2);padding:4px 5px;font-size:12px;line-height:1;border-radius:4px;background:rgba(255,255,255,.05)}
.chip.fix .cy{color:var(--brass)}
.chip .lbl{padding:0 3px;display:inline-flex;align-items:center;gap:5px}
.setbtn{border:1px solid var(--rule2);background:var(--ink3);color:var(--dim);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700}
.setbtn.on{background:var(--brass);border-color:var(--brass);color:#241c08}

.gcard{background:var(--ink2);border:1px solid var(--rule);border-radius:12px}
.ghead{display:flex;align-items:center;gap:6px;padding:8px 10px}
.gname{font-size:13px;font-weight:700;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.gname input{background:none;border:0;padding:0;font-size:13px;font-weight:700;width:100%}
.ic{border:1px solid var(--rule);border-radius:6px;padding:5px 6px;color:var(--dim2);flex:none;line-height:1}
.ic.on{border-color:var(--brass);color:var(--brass)}
.ic.solid{background:var(--ink4);border-color:var(--rule2);color:var(--txt)}
.goff{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px dashed var(--rule);border-radius:8px;background:var(--ink2);opacity:.55;font-size:13px;color:var(--dim2)}

.out{background:var(--ink);border:1px solid var(--rule);border-radius:8px;padding:12px;min-height:92px;
  font-family:var(--mono);font-size:12.5px;line-height:1.75;color:var(--tag);word-break:break-word;-webkit-user-select:text;user-select:text}
.out.empty{color:var(--dim2)}

.rule-item{display:block;width:100%;text-align:left;background:var(--ink2);border:1px solid var(--rule);border-radius:12px;padding:12px}
.rule-item.ex{border-left:3px solid var(--ng)}
.rule-item.lk{border-left:3px solid var(--link)}
.badge{font-size:11px;font-weight:800;letter-spacing:.08em}
.tgt{border-radius:6px;padding:3px 7px;font-size:12px;font-family:var(--mono)}
.tgt.g{font-family:inherit}
.tgt.ex{background:var(--ngbg);border:1px solid var(--ng);color:var(--ng)}
.tgt.lk{background:var(--linkbg);border:1px solid var(--link);color:var(--link)}
.tgt.src{background:var(--tagbg);border:1px solid var(--rule2);color:var(--tag)}
.tgt.src.g{color:var(--txt)}

.err{background:var(--ngbg);border:1px solid var(--ng);color:var(--ng);border-radius:8px;padding:9px 11px;font-size:11px;line-height:1.7;word-break:break-all}
.warn{background:var(--ink2);border:1px solid var(--rule);border-radius:12px;padding:12px 16px;font-size:11px;color:var(--dim);line-height:1.85}
.toast{background:var(--ink4);border:1px solid var(--brass);border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700}
.ph{border:1px dashed var(--rule);border-radius:8px;padding:22px;text-align:center;color:var(--dim2);font-size:12px}

#modal{position:fixed;inset:0;z-index:50;background:rgba(6,9,16,.78);display:flex;align-items:flex-end;justify-content:center}
#modal.hide{display:none}
.sheet{width:100%;max-width:520px;max-height:88vh;background:var(--ink2);border:1px solid var(--rule2);
  border-radius:16px 16px 0 0;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:640px){#modal{align-items:center}.sheet{border-radius:16px}}
.shead{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--rule)}
.shead b{font-size:14px}
.sbody{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
.pickrow{display:flex;align-items:center;gap:8px;width:100%;text-align:left;background:var(--ink3);border:1px solid var(--rule);border-radius:8px;padding:10px 12px;font-size:13px}

.rr{display:flex;align-items:center;gap:8px;background:var(--ink2);border:1px solid var(--rule);border-radius:8px;padding:8px 10px}
.rr.held{border-color:var(--brass);background:var(--brassd)}
.rr.drop{border-style:dashed;border-color:var(--brass)}
.rr .no{font-family:var(--mono);font-size:10px;color:var(--dim2);width:22px;flex:none;text-align:right}
.rr .nm{flex:1;min-width:0;font-size:13px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rr button{flex:none;color:var(--dim2);padding:4px 6px;border-radius:5px;background:rgba(255,255,255,.05);font-size:12px;line-height:1}
.rr .grab{background:var(--ink4);color:var(--txt);padding:6px 9px;font-size:14px}
.uk{display:flex;align-items:center;gap:8px;background:var(--ink);border:1px solid var(--rule);border-radius:8px;padding:6px 8px}
.uk.off{background:transparent;opacity:.4}
.cb{width:20px;height:20px;border:1px solid var(--rule2);border-radius:4px;flex:none;display:flex;align-items:center;justify-content:center;font-size:12px;color:#241c08}
.cb.on{background:var(--brass);border-color:var(--brass)}
.uk .nm{flex:1;min-width:0;font-family:var(--mono);font-size:12px;color:var(--tag);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.uk .to{flex:none;max-width:130px;background:var(--ink3);border:1px solid var(--rule2);border-radius:6px;padding:5px 8px;font-size:11px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.lever{position:sticky;bottom:0;z-index:20;background:var(--ink);border-top:1px solid var(--rule);padding:10px 12px calc(10px + env(safe-area-inset-bottom))}
.lever .wrap{display:flex;gap:8px;padding:0}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="bar"></div>
    <div class="sp">
      <div class="ttl">タグガチャ</div>
      <div class="sub">DANBOORU TAG ROLLER &nbsp;<span style="color:var(--brass)">v2.1 · 07/14</span></div>
    </div>
    <div class="stat" id="stat"></div>
    <button class="save" id="save" data-act="backup">保存</button>
  </div>
  <nav id="nav"></nav>
</header>
<div id="errbox"></div>
<div class="wrap"><main id="app"></main></div>
<div id="lever"></div>
<div id="modal" class="hide"></div>

<script>
"use strict";
/* ══════════ 保存（localStorage。ダメならメモリ） ══════════ */
const KEY = "tag-gacha-v1";
let memStore = null, canStore = true;
function loadRaw(){ try{ return localStorage.getItem(KEY); }catch(e){ canStore=false; return memStore; } }
function saveRaw(v){ try{ localStorage.setItem(KEY, v); }catch(e){ canStore=false; memStore=v; } }

/* ══════════ 小物 ══════════ */
let _n=0;
const uid=()=>Date.now().toString(36)+(_n++).toString(36)+Math.random().toString(36).slice(2,6);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const randInt=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const norm=s=>String(s).replace(/_/g," ").trim().toLowerCase();
const esc=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const $=id=>document.getElementById(id);

/* ══════════ 初期タグ辞書 ══════════ */
const DEF=[
["基本構成",1,1,true,["1girl, solo|女の子ひとり","1boy, solo|男の子ひとり","1girl|女の子","1boy|男の子","2girls|女の子ふたり","1girl, 1boy|男女ペア","1other, solo|性別不明ひとり"]],
["構図・カメラ",1,1,true,["portrait|顔中心","upper body|上半身","cowboy shot|腰上","full body|全身","close-up|クローズアップ","from above|俯瞰","from below|アオリ","from side|横から","from behind|後ろから","dutch angle|斜め構図","wide shot|引き","profile|真横顔","three-quarter view|斜め45度","foreshortening|パース強め","dynamic angle|ダイナミック","straight-on|正面","pov|主観視点"]],
["髪の長さ",1,1,true,["very short hair|ベリーショート","short hair|ショート","medium hair|ミディアム","long hair|ロング","very long hair|スーパーロング","absurdly long hair|超ロング","bob cut|ボブ","hime cut|姫カット"]],
["髪型・毛流れ",1,2,true,["twintails|ツインテール","low twintails|ローツイン","ponytail|ポニテ","high ponytail|ハイポニー","side ponytail|サイドポニー","braid|三つ編み","twin braids|ツイン三つ編み","single braid|一本三つ編み","french braid|編み込み","braided ponytail|編みポニー","hair bun|お団子","double bun|ダブルお団子","half updo|ハーフアップ","messy hair|ラフ・寝癖","straight hair|ストレート","wavy hair|ウェーブ","curly hair|カール","drill hair|ドリル","ringlets|縦ロール","ahoge|アホ毛","antenna hair|触角毛","sidelocks|サイドの毛束","hair between eyes|前髪の毛束","hair over one eye|片目隠れ","blunt bangs|ぱっつん前髪","swept bangs|流し前髪","parted bangs|分け前髪","curtained hair|カーテン前髪","hair intakes|インテーク","floating hair|なびく髪"]],
["髪色",1,1,true,["black hair|黒","brown hair|茶","blonde hair|金","silver hair|銀","white hair|白","grey hair|グレー","blue hair|青","light blue hair|水色","aqua hair|アクア","green hair|緑","red hair|赤","pink hair|ピンク","purple hair|紫","orange hair|オレンジ","multicolored hair|多色","gradient hair|グラデ","two-tone hair|ツートン","colored inner hair|インナーカラー","streaked hair|メッシュ"]],
["目の形",1,1,true,["tsurime|吊り目","tareme|垂れ目","jitome|ジト目","sanpaku|三白眼","half-closed eyes|半目","closed eyes|目を閉じる","one eye closed|片目つむり","narrowed eyes|細めた目","wide-eyed|見開き","aegyo sal|涙袋","heavy-lidded eyes|眠たげ","crazy eyes|狂気の目"]],
["視線",1,1,true,["looking at viewer|カメラ目線","looking away|視線そらし","looking to the side|横目","looking back|振り返り","looking up|見上げ","looking down|見下ろし","looking afar|遠くを見る","eye contact|見つめ合い"]],
["瞳の色",1,1,true,["blue eyes|青","red eyes|赤","green eyes|緑","yellow eyes|黄","purple eyes|紫","brown eyes|茶","black eyes|黒","pink eyes|ピンク","aqua eyes|アクア","orange eyes|オレンジ","grey eyes|グレー","heterochromia|オッドアイ","gradient eyes|グラデ瞳","multicolored eyes|多色瞳"]],
["瞳孔・光",0,1,true,["star-shaped pupils|星型瞳孔","heart-shaped pupils|ハート瞳孔","cross-shaped pupils|十字瞳孔","symbol-shaped pupils|記号瞳孔","slit pupils|縦長瞳孔","ringed eyes|輪状の瞳","glowing eyes|発光する目","sparkling eyes|キラキラ目","empty eyes|ハイライトなし","constricted pupils|縮んだ瞳孔"]],

/* 出てるタグから「どこまで写ってるか」を判定してフレーミングタグを差し込む */
function applyFrame(D,byGroup){
  const s=D.settings;
  if(!s.autoFrame) return;
  const txt=Object.values(byGroup).flat().map(t=>norm(t.tag)).join(" | ");
  const hit=list=>String(list||"").split(",").map(x=>x.trim().toLowerCase())
    .filter(Boolean).some(k=>txt.includes(k));
  const want = hit(s.frameFull) ? "full body" : hit(s.frameCowboy) ? "cowboy shot" : "upper body";
  for(const gid of Object.keys(byGroup))
    byGroup[gid]=byGroup[gid].filter(t=>!FRAME_TAGS.includes(norm(t.tag)));
  const g=D.groups.find(x=>x.tags.some(t=>FRAME_TAGS.includes(norm(t.tag))))||D.groups[0];
  if(!g) return;
  const own=g.tags.find(t=>norm(t.tag)===want);
  byGroup[g.id]=[own||{id:"__frame",tag:want,ja:"自動判定",w:1,emph:1,on:true,fix:false},...(byGroup[g.id]||[])];
}

/* ══════════ 抽選エンジン ══════════ */
function weightedIndex(arr){
  const tot=arr.reduce((s,t)=>s+Math.max(0,Number(t.w)||0),0);
  if(tot<=0) return Math.floor(Math.random()*arr.length);
  let r=Math.random()*tot;
  for(let i=0;i<arr.length;i++){ r-=Math.max(0,Number(arr[i].w)||0); if(r<0) return i; }
  return arr.length-1;
}
function rollGroup(g,blocked,minOv){
  const lo=minOv!=null?Math.max(minOv,Math.min(g.min,g.max)):Math.min(g.min,g.max);
  const hi=Math.max(lo,Math.max(g.min,g.max));
  const n=randInt(lo,hi);
  if(n<=0) return [];
  const NG=ngSet();
  const avail=g.tags.filter(t=>t.on&&!t.fix&&!blocked.has(t.id)&&!NG.has(norm(t.tag)));
  const out=[];
  for(let i=0;i<n&&avail.length;i++){ const k=weightedIndex(avail); out.push(avail[k]); avail.splice(k,1); }
  return out;
}
function makeBlocker(D){
  const bT=new Set(),bG=new Set();
  const byId=new Map(D.groups.map(g=>[g.id,g]));
  const block=ref=>{
    if(!ref) return;
    if(ref.k==="tag") bT.add(ref.id);
    else { bG.add(ref.id); const g=byId.get(ref.id); if(g) g.tags.forEach(t=>bT.add(t.id)); }
  };
  const fire=hit=>{
    for(const r of D.rules){
      if(r.type!=="exclude") continue;
      if(r.a.k===hit.k&&r.a.id===hit.id) r.targets.forEach(block);
      if(r.dir==="both"&&r.targets.some(t=>t.k===hit.k&&t.id===hit.id)) block(r.a);
    }
  };
  return {bT,bG,fire};
}
function generate(D,locks,prev){
  locks=locks||{};
  const {bT,bG,fire}=makeBlocker(D);
  const byGroup={}, done=new Set();
  let setCharHit=false;
  const emit=(g,picked)=>{
    byGroup[g.id]=[...(byGroup[g.id]||[]),...picked];
    picked.forEach(t=>fire({k:"tag",id:t.id}));
    if(picked.length) fire({k:"group",id:g.id});
  };
  // 0) セット枠 と 固定タグ を先に確定（排他もこれが勝つ）
  for(const g of D.groups){
    if(!g.on) continue;
    if(g.mode==="set"){
      done.add(g.id);
      if(g.setOn){ const on=g.tags.filter(t=>t.on); emit(g,on); if(g.char&&on.length) setCharHit=true; }
      else byGroup[g.id]=[];
      continue;
    }
    const fx=g.tags.filter(t=>t.on&&t.fix);
    if(fx.length) emit(g,fx);
  }
  // 1) ロック据え置き
  for(const g of D.groups){
    if(!g.on||!locks[g.id]||!prev||!prev.byGroup[g.id]) continue;
    const kept=prev.byGroup[g.id].filter(t=>g.tags.some(x=>x.id===t.id));
    byGroup[g.id]=[]; done.add(g.id); emit(g,kept);
  }
  // 1.5) キャラグループを先に引く（当たったら容姿の抽選を止める）
  let charHit=setCharHit;
  for(const g of D.groups){
    if(!g.on||!g.char||g.mode==="set"||done.has(g.id)) continue;
    done.add(g.id);
    if(bG.has(g.id)){ byGroup[g.id]=byGroup[g.id]||[]; continue; }
    const pk=rollGroup(g,bT,g.req?Math.max(1,g.min):null);
    emit(g,pk);
    if(pk.length) charHit=true;
  }
  if(charHit&&D.settings.charSuppress){
    for(const nm of String(D.settings.charBlock||"").split(",").map(s=>s.trim()).filter(Boolean)){
      const g=D.groups.find(x=>x.name===nm&&!x.char);
      if(g){ bG.add(g.id); g.tags.forEach(t=>bT.add(t.id)); byGroup[g.id]=[]; }
    }
  }

  // 2) 必須 → 通常
  const order=[...D.groups.filter(g=>g.req&&g.mode!=="set"&&!g.char),...D.groups.filter(g=>!g.req&&g.mode!=="set"&&!g.char)];
  for(const g of order){
    if(!g.on||done.has(g.id)) continue;
    done.add(g.id);
    if(!g.req&&bG.has(g.id)){ byGroup[g.id]=byGroup[g.id]||[]; continue; }
    emit(g,rollGroup(g,bT,g.req?Math.max(1,g.min):null));
  }
  // 3) 連動
  for(let p=0;p<6;p++){
    let ch=false;
    const hasT=new Set(Object.values(byGroup).flat().map(t=>t.id));
    const hasG=new Set(Object.entries(byGroup).filter(([,v])=>v.length).map(([k])=>k));
    for(const r of D.rules){
      if(r.type!=="link") continue;
      let fired = r.a.k==="tag" ? hasT.has(r.a.id) : hasG.has(r.a.id);
      if(r.a.k==="char" && !fired){
        // 起点=キャラ：どれかキャラグループが当たっていれば発火
        fired = D.groups.some(g=>g.char && (byGroup[g.id]||[]).some(t=>!t.fix));
      }
      if(!fired) continue;
      const qty = r.qty||"one";            // "one" | "all" | 数字文字列
      for(const tg of r.targets){
        if(tg.k==="tag"){
          if(hasT.has(tg.id)||bT.has(tg.id)) continue;
          const g=D.groups.find(x=>x.tags.some(t=>t.id===tg.id));
          if(!g||bG.has(g.id)) continue;
          byGroup[g.id]=[...(byGroup[g.id]||[]),g.tags.find(x=>x.id===tg.id)]; ch=true;
        }else{
          const g=D.groups.find(x=>x.id===tg.id);
          if(!g||bG.has(g.id)) continue;
          const already=byGroup[g.id]||[];
          if(qty==="all"){
            // グループの全タグを入れる（固定は除外・NG/排他は尊重）
            const NG=ngSet();
            const add=g.tags.filter(t=>t.on&&!t.fix&&!bT.has(t.id)&&!NG.has(norm(t.tag))&&!already.some(x=>x.id===t.id));
            if(add.length){ byGroup[g.id]=[...already,...add]; ch=true; }
          }else if(already.length){
            continue;   // one/N個：既に何か出てるなら触らない
          }else{
            const n = qty==="one" ? Math.max(1,g.min) : Math.max(1,parseInt(qty)||1);
            const pk=rollGroup(g,bT,n);
            if(pk.length){ byGroup[g.id]=pk.slice(0,n); ch=true; }
          }
        }
      }
    }
    if(!ch) break;
  }
  applyFrame(D,byGroup);
  return {byGroup};
}
function rerollOne(D,res,gid){
  const g=D.groups.find(x=>x.id===gid);
  if(!g||g.mode==="set") return res;
  const {bT,bG,fire}=makeBlocker(D);
  for(const og of D.groups){
    if(og.id===gid) continue;
    const arr=res.byGroup[og.id]||[];
    arr.forEach(t=>fire({k:"tag",id:t.id}));
    if(arr.length) fire({k:"group",id:og.id});
  }
  const fixed=g.tags.filter(t=>t.on&&t.fix);
  const picked=(!g.req&&bG.has(gid))?[]:rollGroup(g,bT,g.req?Math.max(1,g.min):null);
  return {byGroup:{...res.byGroup,[gid]:[...fixed,...picked]}};
}
function fmtTag(t,s){
  const parts=String(t.tag).split(",").map(x=>x.trim()).filter(Boolean).map(x=>{
    let y=x;
    if(s.underscore) y=y.replace(/\s+/g,"_");
    if(s.escapeParens) y=y.replace(/([()])/g,"\\$1");
    return y;
  });
  let out=parts.join(", ");
  const e=Number(t.emph)||1;
  if(e!==1) out="("+out+":"+(Math.round(e*100)/100)+")";
  return out;
}
function toSegs(D,res){
  const s=D.settings, segs=[], NG=ngSet(), seen=new Set();
  const add=(txt,fix)=>{
    for(const part of String(txt).split(",").map(x=>x.trim()).filter(Boolean)){
      const k=norm(part.replace(/^\(|:[\d.]+\)$/g,""));
      if(NG.has(k)) continue;
      if(s.dedupe&&seen.has(k)) continue;
      seen.add(k);
      segs.push({t:part,f:fix});
    }
  };
  if(s.prefix.trim()) add(s.prefix,true);
  if(res) for(const g of D.groups) (res.byGroup[g.id]||[]).forEach(t=>add(fmtTag(t,s),!!t.fix));
  if(s.suffix.trim()) add(s.suffix,true);
  return segs;
}
function toPrompt(D,res){ return toSegs(D,res).map(x=>x.t).join(", "); }

const CATS=[["0","general / 一般（絵の内容）"],["4","character / キャラ名"],["3","copyright / 作品名"],["1","artist / 絵師"],["5","meta / メタ情報"]];
const DEFAULT_BLOCK="translated, translation, commentary, request, artist name, character name, copyright name, signature, watermark, username, web address, dated, bad id, resized, revision, sample, third-party edit, alternate";

const logWeight=c=>c>0?Math.max(.1,Math.round((Math.log10(c)-2)*10)/10):.1;

function parseTagPayload(txt){
  const t=String(txt).trim();
  if(!t) return [];
  if(t[0]==="["||t[0]==="{"){
    let j=JSON.parse(t); if(!Array.isArray(j)) j=[j];
    return j.filter(x=>x&&x.name).map(x=>({name:String(x.name),count:Number(x.post_count)||0,cat:Number(x.category)||0,dep:!!x.is_deprecated}));
  }
  return t.split(/\n/).map(l=>l.trim()).filter(Boolean).map(l=>{
    const m=l.match(/^([^\s,|]+)(?:[\s,|]+(\d+))?/);
    return m?{name:m[1],count:Number(m[2])||0,cat:0,dep:false}:null;
  }).filter(Boolean);
}
function planImport(pool,D,o){
  const have=new Set(D.groups.flatMap(g=>g.tags.map(t=>norm(t.tag))));
  const blocks=o.block.split(",").map(s=>s.trim().toLowerCase()).filter(Boolean);
  const keep=[], skip={dep:0,low:0,block:0,dupe:0}, seen=new Set();
  for(const r of pool){
    const name=r.name.replace(/_/g," ").trim(), key=norm(name);
    if(r.dep){skip.dep++;continue;}
    if(r.count<o.minCount){skip.low++;continue;}
    if(blocks.some(b=>key.includes(b))){skip.block++;continue;}
    if(have.has(key)||seen.has(key)){skip.dupe++;continue;}
    seen.add(key);
    keep.push({id:uid(),tag:name,ja:"",w:o.useWeight?logWeight(r.count):1,emph:1,on:true,fix:false,pc:r.count});
  }
  return {keep,skip};
}

/* related_tag.json / tags.json / posts.json  どの形でも拾える寛容パーサ */
function harvestTags(any,wantCat){
  const out=[],seen=new Set();
  const push=(n,c,cat,dep)=>{ if(!n||seen.has(n))return; seen.add(n); out.push({name:n,count:Number(c)||0,cat:Number(cat),dep:!!dep}); };
  const walk=o=>{
    if(!o||typeof o!=="object") return;
    if(Array.isArray(o)){ o.forEach(walk); return; }
    if(typeof o.name==="string"&&(o.post_count!==undefined||o.category!==undefined)){
      const cat=Number(o.category);
      if(wantCat==null||cat===wantCat) push(o.name,o.post_count,cat,o.is_deprecated);
    }
    if(typeof o.tag_string_character==="string")
      o.tag_string_character.split(/\s+/).filter(Boolean).forEach(n=>push(n,0,4,false));
    for(const k of Object.keys(o)) if(o[k]&&typeof o[k]==="object") walk(o[k]);
  };
  walk(any);
  return out;
}
const seriesOf=n=>{ const m=String(n).match(/\(([^)]+)\)/); return m?m[1].replace(/_/g," ").trim():null; };

function planChars(pool,o){
  const bySeries=new Map(), other=[], seen=new Set();
  for(const r of pool){
    if(r.dep||r.count<o.minCount) continue;
    const name=r.name.replace(/_/g," ").trim(), key=norm(name);
    if(!name||seen.has(key)) continue;
    seen.add(key);
    const s=seriesOf(r.name);
    const it={name,count:r.count};
    if(s){ if(!bySeries.has(s)) bySeries.set(s,[]); bySeries.get(s).push(it); }
    else other.push(it);
  }
  for(const [s,arr] of [...bySeries]) if(arr.length<o.minChars){ other.push(...arr); bySeries.delete(s); }
  const total=[...bySeries.values()].reduce((a,b)=>a+b.length,0)+other.length;
  return {bySeries,other,total};
}

const extractPostId=s=>{
  const m=String(s).match(/posts\/(\d+)/)||String(s).match(/^\s*(\d{2,9})\s*$/);
  return m?m[1]:null;
};
const cleanToken=s=>String(s).replace(/\\([()])/g,"$1").replace(/:\s*[\d.]+\s*\)?\s*$/,"")
  .replace(/^[\s(]+|[\s)]+$/g,"").replace(/_/g," ").trim();
function postToTags(j){
  const sp=s=>String(s||"").split(/\s+/).map(cleanToken).filter(Boolean);
  return {id:j.id||null,general:sp(j.tag_string_general||j.tag_string),character:sp(j.tag_string_character),
          copyright:sp(j.tag_string_copyright),artist:sp(j.tag_string_artist)};
}
function parseAnySource(txt){
  const t=String(txt).trim();
  if(!t) return null;
  if(t[0]==="{"||t[0]==="["){
    let j=JSON.parse(t); if(Array.isArray(j)) j=j[0];
    if(j&&(j.tag_string_general||j.tag_string)) return postToTags(j);
    throw new Error("not a post");
  }
  const parts=t.includes(",")?t.split(/[,\n]/):t.split(/[\s\n]+/);
  return {id:null,general:parts.map(cleanToken).filter(Boolean),character:[],copyright:[],artist:[]};
}
const tagMatches=(t,set)=>t.tag.split(",").map(x=>norm(x)).filter(Boolean).every(p=>set.has(p));
function buildRecipe(names,D){
  const set=new Set(names.map(norm).filter(Boolean));
  const byGroup={}, used=new Set();
  for(const g of D.groups){
    const hit=g.tags.filter(t=>tagMatches(t,set));
    if(hit.length){ byGroup[g.id]=hit; hit.forEach(t=>t.tag.split(",").forEach(p=>used.add(norm(p)))); }
  }
  return {byGroup,unknown:[...set].filter(n=>!used.has(n))};
}
/* 自動振り分け：既存グループの語彙から推測 */
const STOP=new Set(["a","an","the","of","on","in","with","and","to","own","one","two","up","out","over"]);
const wordsOf=s=>norm(s).split(/[\s,()]+/).filter(w=>w&&!STOP.has(w));
function buildWordIndex(D){
  const any=new Map(), last=new Map(), size=new Map();
  const bump=(m,w,gid)=>{ if(!m.has(w)) m.set(w,new Map()); const g=m.get(w); g.set(gid,(g.get(gid)||0)+1); };
  for(const g of D.groups){
    size.set(g.id,Math.max(1,g.tags.length));
    for(const t of g.tags){
      const ws=wordsOf(t.tag);
      if(!ws.length) continue;
      ws.forEach(w=>bump(any,w,g.id));
      bump(last,ws[ws.length-1],g.id);
    }
  }
  return {any,last,size};
}
function guessGroup(name,idx){
  const ws=wordsOf(name);
  if(!ws.length) return null;
  const sc=new Map();
  const add=(gid,v)=>sc.set(gid,(sc.get(gid)||0)+v/Math.sqrt(idx.size.get(gid)||1));
  const head=idx.last.get(ws[ws.length-1]);
  if(head) for(const [gid,n] of head) add(gid,3*Math.min(n,8));
  for(const w of ws){
    const m=idx.any.get(w);
    if(!m) continue;
    const spread=[...m.values()].reduce((a,b)=>a+b,0);
    const inf=1/Math.log2(2+spread);
    for(const [gid,n] of m) add(gid,inf*Math.min(n,8));
  }
  let best=null,bv=0;
  for(const [gid,v] of sc) if(v>bv){ bv=v; best=gid; }
  return bv>.35?best:null;
}

const HIST_MAX=60;
function pushHistory(){
  if(!V.result) return;
  const p=prompt();
  if(!p) return;
  D.history=D.history||[];
  if(D.history[0]&&D.history[0].p===p) return;          // 同じものは連続で積まない
  const snap={};
  for(const g of D.groups){
    const arr=V.result.byGroup[g.id]||[];
    if(arr.length) snap[g.id]=arr.map(t=>({id:t.id,tag:t.tag,ja:t.ja||"",emph:t.emph||1,fix:!!t.fix}));
  }
  D.history.unshift({id:uid(),ts:Date.now(),p,fav:false,r:snap});
  const favs=D.history.filter(x=>x.fav);
  const rest=D.history.filter(x=>!x.fav).slice(0,HIST_MAX);
  D.history=[...D.history.filter(x=>favs.includes(x)||rest.includes(x))];
  persist();
}

let saveTimer=null;
function persist(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>saveRaw(JSON.stringify(D)),300);
}
function mutate(fn){ fn(); V.dirty=true; persist(); render(); }

let toastTimer=null;
function say(m){
  V.toast=m; render();
  clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>{ V.toast=""; render(); },1800);
}
function copy(text){
  if(!text) return;
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>say("コピーしました")).catch(()=>fallbackCopy(text));
  } else fallbackCopy(text);
}
function fallbackCopy(text){
  try{
    const ta=document.createElement("textarea");
    ta.value=text; ta.style.position="fixed"; ta.style.top="-999px";
    document.body.appendChild(ta); ta.select(); document.execCommand("copy"); ta.remove();
    say("コピーしました");
  }catch(e){ say("コピー不可。長押しで選択して"); }
}

/* ══════════ 予測変換（登録済みの単語から） ══════════ */
function sugHTML(){
  const cut=Math.max(V.bulk.lastIndexOf(","),V.bulk.lastIndexOf("\n"));
  const tok=V.bulk.slice(cut+1).trim().toLowerCase();
  if(tok.length<2) return "";
  const head=[],mid=[],seen=new Set();
  for(const g of D.groups){
    for(const t of g.tags){
      const k=t.tag.toLowerCase();
      if(seen.has(k)) continue;
      const ja=(t.ja||"").toLowerCase();
      if(k.startsWith(tok)){ seen.add(k); head.push([t,g]); }
      else if(k.includes(tok)||(ja&&ja.includes(tok))){ seen.add(k); mid.push([t,g]); }
      if(head.length>=14) break;
    }
    if(head.length>=14) break;
  }
  const list=[...head,...mid].slice(0,14);
  if(!list.length) return "";
  return `<div class="mini" style="margin:6px 0 4px">候補（タップで入力）</div><div class="chips">`+
    list.map(([t,g])=>`<button class="chip" data-act="sugPick" data-v="${esc(t.tag)}">${esc(t.tag)}`+
      (t.ja?`<span class="ja">${esc(t.ja)}</span>`:"")+
      `<span class="ja" style="color:var(--dim2)">${esc(g.name)}</span></button>`).join("")+`</div>`;
}
function refreshSug(){ const el=document.querySelector("[data-sug]"); if(el) el.innerHTML=sugHTML(); }

function viewGroups(){
  if(V.reorder) return viewReorder();
  const lq=V.q.trim().toLowerCase();
  let h=`<div class="row" style="gap:8px;margin-bottom:2px">
    <button class="btn solid full" data-act="reorder">⇅ 並び替え（${D.groups.length}グループ）</button>
  </div>
  <div class="row" style="background:var(--ink2);border:1px solid var(--rule);border-radius:8px;padding:0 12px">
    <span style="color:var(--dim2)">🔍</span>
    <input type="text" data-inp="q" data-k="q" placeholder="単語を検索（英語・日本語）" value="${esc(V.q)}"
      style="background:none;border:0;padding:10px 0">
    ${V.q?'<button data-act="clearQ" style="color:var(--dim2)">✕</button>':""}
  </div>`;

  let budget=lq?400:Infinity;
  for(let i=0;i<D.groups.length;i++){
    const g=D.groups[i];
    const hits=lq?g.tags.filter(t=>t.tag.toLowerCase().includes(lq)||(t.ja||"").toLowerCase().includes(lq)):g.tags;
    if(lq&&!hits.length) continue;
    const open=lq?true:!!V.openG[g.id];
    const cap=V.limitG[g.id]||120;
    let shown=[];
    if(open){ shown=hits.slice(0,Math.min(cap,budget)); budget-=shown.length; }

    h+=`<div class="gcard"><div class="ghead">
      <button data-act="toggleG" data-id="${g.id}" style="color:var(--dim2);flex:none">${open?"▾":"▸"}</button>
      <span class="gname"><input type="text" data-inp="gname" data-id="${g.id}" data-k="gn${g.id}" value="${esc(g.name)}"></span>
      <span class="mono" style="font-size:10px;color:var(--tag);flex:none">${hits.length}${lq?"/"+g.tags.length:""}</span>
      <button data-act="moveUp" data-i="${i}" style="color:var(--dim2);flex:none">▲</button>
      <button data-act="moveDn" data-i="${i}" style="color:var(--dim2);flex:none">▼</button>
      ${sw(g.on,"gOn",` data-id="${g.id}"`)}
    </div>`;

    if(open){
      const isSet=g.mode==="set";
      h+=`<div style="padding:0 12px 12px;border-top:1px solid var(--rule)">
        <div class="row" style="padding:10px 0;font-size:12px;color:var(--dim)">
          ${isSet?`<span style="color:var(--brass);font-weight:700">📦 セット枠（抽選しない）</span>`:`
            <span>抽選数</span>
            <select data-sel="gmin" data-id="${g.id}">${numOpts(g.min)}</select><span>〜</span>
            <select data-sel="gmax" data-id="${g.id}">${numOpts(g.max)}</select><span>個</span>`}
          <div class="sp"></div>
          <button data-act="delG" data-id="${g.id}" style="color:var(--ng)">🗑</button>
        </div>

        <div class="row" style="background:var(--ink3);border-radius:8px;padding:8px 12px;margin-bottom:8px">
          <span style="flex:none">📦</span>
          <div class="sp">
            <div style="font-size:12px;font-weight:700;color:${isSet?"var(--brass)":"var(--dim)"}">セット枠にする</div>
            <div class="mini">抽選せず、生成タブのボタン1つで丸ごと入れる</div>
          </div>
          ${sw(isSet,"gMode",` data-id="${g.id}"`)}
        </div>
${isSet?"":`
        <div class="row" style="background:var(--ink3);border-radius:8px;padding:8px 12px;margin-bottom:8px">
          <span style="flex:none">📌</span>
          <div class="sp">
            <div style="font-size:12px;font-weight:700;color:${g.req?"var(--txt)":"var(--dim)"}">必須グループ</div>
            <div class="mini">排他ルールで潰されず、最優先で必ず1個以上出す</div>
          </div>
          ${sw(!!g.req,"gReq",` data-id="${g.id}"`)}
        </div>`}

        <div class="row" style="gap:8px;margin-bottom:10px">
          <button class="btn full" data-act="fixAll" data-id="${g.id}">📌 全部を固定に</button>
          <button class="btn full" data-act="unfixAll" data-id="${g.id}">固定を解除</button>
        </div>

        <div class="chips">`+shown.map(t=>
          `<button class="chip${t.fix?" fix":""}${t.on?"":" off"}" data-act="editTag" data-id="${g.id}" data-tid="${t.id}">${t.fix?'<span style="font-size:9px">📌</span>':""}${esc(t.tag)}${t.ja?`<span class="ja">${esc(t.ja)}</span>`:""}${(Number(t.w)||1)!==1?`<span class="ja" style="color:var(--brass)">×${t.w}</span>`:""}${(Number(t.emph)||1)!==1?`<span class="ja" style="color:var(--brass)">:${t.emph}</span>`:""}</button>`
        ).join("")+`</div>`;

      if(open&&hits.length>shown.length){
        h+=`<button class="btn full" data-act="more" data-id="${g.id}" style="margin-top:8px">残り ${hits.length-shown.length} 語を表示</button>`;
      }

      if(V.addTo===g.id){
        h+=`<div class="col" style="background:var(--ink);border:1px solid var(--rule2);border-radius:8px;padding:12px;margin-top:12px">
          <div class="muted"><b style="color:var(--brass)">カンマ「,」区切り</b>でまとめて貼れます（改行でもOK）。<br>
            <span class="mono" style="color:var(--tag)">tag|メモ</span> で日本語メモも付けられます。</div>
          <textarea rows="4" data-inp="bulk" data-k="bulk" placeholder="long hair, twintails, blue eyes&#10;&#10;cat ears|猫耳, fox ears|狐耳">${esc(V.bulk)}</textarea>
          <div data-sug>${sugHTML()}</div>
          <label class="row" style="font-size:12px;color:var(--dim)">
            <button class="cb${V.bulkComma?" on":""}" data-act="bulkComma">${V.bulkComma?"✓":""}</button>カンマ「,」でも区切る</label>
          <div class="row" style="gap:8px">
            <button class="btn full" data-act="cancelAdd">やめる</button>
            <button class="btn lever full" data-act="doAdd" data-id="${g.id}">＋ 追加</button>
          </div>
        </div>`;
      } else {
        h+=`<button class="btn full" data-act="openAdd" data-id="${g.id}" style="margin-top:12px">＋ 単語を追加</button>`;
      }
      h+=`</div>`;
    }
    h+=`</div>`;
  }
  h+=`<button class="btn solid full" data-act="addGroup">＋ グループを追加</button>
    <div class="mini" style="padding:0 4px">並び順が抽選の順番です。上のグループほど先に引かれ、排他ルールで優先されます。</div>`;
  return h;
}

function viewRules(){
  let h=`<div class="card"><div class="pad muted">
    <b style="color:var(--ng)">排他</b> = これが出たら、あれは出さない。<br>
    <b style="color:var(--link)">連動</b> = これが出たら、あれも一緒に出す。<br>
    起点は <span class="mono" style="color:var(--tag)">単語</span>・<b>［グループ］</b>・<b>👤キャラ</b> から、対象は 単語・グループ から選べます。<br>
    連動でグループを対象にすると、<b style="color:var(--link)">1個 / 2個 / 3個 / 全部</b> の量を選べます。
  </div></div>`;
  h+=`<div class="card"><div class="pad col">
    <div class="eb">よく使うルールをワンタップ追加</div>
    <button class="btn full" data-act="rulePreset" data-p="catset">🐱 猫耳が出たら → 猫尻尾＋耳のもふもふも出す</button>
    <button class="btn full" data-act="rulePreset" data-p="closedeyes">😌 目を閉じたら → 瞳の色・視線を出さない</button>
    <button class="btn full" data-act="rulePreset" data-p="behind">🔙 後ろ姿なら → 顔まわりを全部出さない</button>
    <button class="btn full" data-act="rulePreset" data-p="charframe">👤 キャラが出たら → 全身(full body)を出す</button>
    <div class="mini">押すと下にルールが増えます。中身はタップして編集できます。</div>
  </div></div>`;
  if(!D.rules.length) h+=`<div class="ph">下の「＋ ルールを追加」か、上のワンタップから作れます。</div>`;
  for(const r of D.rules){
    const ex=r.type==="exclude";
    const ql = !ex ? (r.qty==="all"?" ・全部":r.qty==="2"?" ・2個":r.qty==="3"?" ・3個":"") : "";
    h+=`<button class="rule-item ${ex?"ex":"lk"}" data-act="editRule" data-id="${r.id}">
      <div class="row" style="margin-bottom:8px">
        <span class="badge" style="color:${ex?"var(--ng)":"var(--link)"}">${ex?(r.dir==="both"?"排他 ⟷ 双方向":"排他 → 片方向"):"連動 →"+ql}</span>
        <div class="sp"></div><span style="color:var(--dim2)">✎</span>
      </div>
      <div class="chips">
        <span class="tgt src${r.a.k==="group"?" g":""}">${esc(refLabel(r.a))}</span>
        <span style="color:var(--dim2);font-size:12px;align-self:center">${ex?"が出たら ✕":"が出たら ＋"}</span>
        ${r.targets.map(t=>`<span class="tgt ${ex?"ex":"lk"}${t.k==="group"?" g":""}">${esc(refLabel(t))}</span>`).join("")}
      </div></button>`;
  }
  h+=`<button class="btn solid full" data-act="newRule">＋ ルールを追加</button>`;
  return h;
}

        </div></div>`;

  /* dict mode */
  h+=`<div class="card"><div class="pad muted">
    danbooru の <span class="mono" style="color:var(--tag)">tags.json</span> を読み込んで、単語を一気に増やせます。<br>
    <b style="color:var(--brass)">ポスト数が多い順</b>に返るので、上位を取れば「モデルがよく知ってるタグ」だけが入ります。

    <div><div class="eb">カテゴリ</div>

    <div class="row" style="gap:8px">
      <button class="btn full" data-act="copyDbURL">URLをコピー</button>

    </div>
    <div class="mini">開いたら全選択コピー → 下に貼り付け。<span class="mono">page=2, 3…</span> と変えれば続きが取れます。</div>
    <textarea rows="3" data-inp="dbPaste" data-k="dbp" placeholder='[{"name":"long_hair","post_count":1234567,"category":0}, ...]'>${esc(V.dbPaste)}</textarea>
    <button class="btn solid full" data-act="dbParse"${V.dbPaste.trim()?"":" disabled"}>⇧ 貼り付けたJSONを読む</button>
  </div></div>`;

  const has=V.dbPool.length;
  h+=`<div class="card${has?" hi":""}"><div class="pad col">
    <div class="row"><span class="mono" style="font-size:11px;color:var(--brass);font-weight:700">02</span>
      <b class="sp" style="font-size:13px">ふるいにかける</b>
      <span class="mono" style="font-size:11px;color:${has?"var(--tag)":"var(--dim2)"}">取得 ${has} 語</span></div>`;
  if(!has){ h+=`<div class="ph">まだ何も取ってきてません</div></div></div>`; return h; }

  const plan=planImport(V.dbPool,D,{minCount:V.dbMin,block:V.dbBlock,useWeight:V.dbWeight});
  h+=`<div class="row"><span style="font-size:12px;color:var(--dim)">最小ポスト数</span>
      <input type="number" min="0" step="100" value="${V.dbMin}" data-inp="dbMin" style="width:92px">
      <span class="mini">以上だけ</span></div>
    <div><div class="eb">除外ワード（部分一致・カンマ区切り）</div>
      <textarea rows="2" data-inp="dbBlock" data-k="dbb">${esc(V.dbBlock)}</textarea>
      <div class="mini" style="margin-top:4px">既定はプロンプトに要らんメタ語。要らん単語はここに足せば弾けます。</div></div>
    <div class="row" style="background:var(--ink3);border-radius:8px;padding:9px 12px">
      <div class="sp"><div style="font-size:12px;font-weight:700">ポスト数を抽選ウェイトに</div>
        <div class="mini mono">1,000→×1.0 / 10,000→×2.0 / 100,000→×3.0</div></div>
      ${sw(V.dbWeight,"dbWeight")}
    </div>
    <div style="background:var(--ink);border:1px solid var(--rule2);border-radius:8px;padding:12px">
      <div style="margin-bottom:6px"><span class="mono" style="font-size:22px;font-weight:800;color:var(--brass)">${plan.keep.length}</span>

      <div class="mini mono">除外: 重複 ${plan.skip.dupe} / ポスト数不足 ${plan.skip.low} / 除外ワード ${plan.skip.block} / 廃止 ${plan.skip.dep}</div>
      ${plan.keep.length?`<div class="chips" style="margin-top:8px">${plan.keep.slice(0,24).map(t=>`<span class="chip" style="font-size:10.5px">${esc(t.tag)}${V.dbWeight?`<span class="ja" style="color:var(--brass)">×${t.w}</span>`:""}</span>`).join("")}${plan.keep.length>24?`<span class="mini">… 他 ${plan.keep.length-24} 語</span>`:""}</div>`:""}
    </div>
    <div><div class="eb">入れ先グループ</div>
      <select data-sel="dbTarget" style="width:100%">
        <option value="__new"${V.dbTarget==="__new"?" selected":""}>＋ 新しいグループを作る</option>
        ${D.groups.map(g=>`<option value="${g.id}"${V.dbTarget===g.id?" selected":""}>${esc(g.name)}（${g.tags.length}語）</option>`).join("")}
      </select>
      ${V.dbTarget==="__new"?`<input type="text" data-inp="dbNewName" data-k="dbn" value="${esc(V.dbNewName)}" style="margin-top:8px">`:""}
    </div>
    <div class="row" style="gap:8px">
      <button class="btn" data-act="dbClear">捨てる</button>
      <button class="btn lever full" data-act="dbCommit"${plan.keep.length?"":" disabled"}>＋ ${plan.keep.length} 語を追加</button>
    </div>
  </div></div>
  <div class="warn"><b style="color:var(--txt)">入れすぎ注意。</b> 1万語を1グループに突っ込んで無作為に引くと、脈絡のないプロンプトしか出ません。
    取込先の抽選数は <span class="mono" style="color:var(--brass)">0〜1個</span> にして「スパイス枠」として使うのがおすすめ。
    キャラ名・作品名は必ず<b style="color:var(--txt)">別グループ</b>に。</div>`;
  return h;
}

function viewHist(){
  const hs=D.history||[];
  const q=(V.histQ||"").trim().toLowerCase();
  const list=hs.filter(x=>!q||x.p.toLowerCase().includes(q));
  let h=`<div class="row" style="background:var(--ink2);border:1px solid var(--rule);border-radius:8px;padding:0 12px">
    <span style="color:var(--dim2)">🔍</span>
    <input type="text" data-inp="histQ" data-k="hq" placeholder="履歴を検索" value="${esc(V.histQ||"")}" style="background:none;border:0;padding:10px 0">
  </div>`;
  if(!hs.length) return h+`<div class="ph">まだ履歴がありません。<br>「抽選する」を押すと自動で溜まります。</div>`;
  h+=`<div class="row" style="gap:8px">
    <span class="mini sp">${list.length} 件${hs.filter(x=>x.fav).length?` / ★${hs.filter(x=>x.fav).length}`:""}</span>
    <button class="btn ng" data-act="histClear" style="padding:5px 10px;font-size:11px">★以外を全消し</button>
  </div>`;
  for(const it of list.slice(0,80)){
    const d=new Date(it.ts);
    const tm=`${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
    h+=`<div class="card"${it.fav?' style="border-color:var(--brass)"':""}><div class="pad" style="padding:10px 12px">
      <div class="row" style="margin-bottom:6px">
        <button data-act="histFav" data-id="${it.id}" style="font-size:15px;flex:none;color:${it.fav?"var(--brass)":"var(--dim2)"}">${it.fav?"★":"☆"}</button>
        <span class="mini sp mono">${tm}</span>
        <button class="btn" data-act="histCopy" data-id="${it.id}" style="padding:4px 9px;font-size:11px">コピー</button>
        <button class="btn solid" data-act="histLoad" data-id="${it.id}" style="padding:4px 9px;font-size:11px">呼び戻す</button>
        <button data-act="histDel" data-id="${it.id}" style="color:var(--ng);flex:none">🗑</button>
      </div>
      <div class="mono" style="font-size:11px;line-height:1.7;color:var(--tag);word-break:break-word;-webkit-user-select:text;user-select:text">${esc(it.p)}</div>
    </div></div>`;
  }
  return h;
}

function viewModal(){
  const m=V.modal;
  if(!m) return "";
  const sheet=(title,body)=>`<div class="sheet">
    <div class="shead"><b>${esc(title)}</b><button data-act="closeModal" style="color:var(--dim)">✕</button></div>
    <div class="sbody">${body}</div></div>`;

  if(m.type==="confirm"){
    return sheet("確認",`<div style="font-size:14px;line-height:1.9">${esc(m.msg)}</div>
      <div class="row" style="gap:8px"><button class="btn full" data-act="closeModal">やめる</button>
      <button class="btn ng full" data-act="confirmYes">実行する</button></div>`);
  }

  if(m.type==="tag"){
    const g=D.groups.find(x=>x.id===m.gid);
    const t=g&&g.tags.find(x=>x.id===m.tid);
    if(!t) return "";
    return sheet("単語を編集",`
      <div><div class="eb">TAG（英語 / danbooru）</div><input type="text" class="mono" data-inp="mTag" data-k="mt" value="${esc(t.tag)}"></div>
      <div><div class="eb">メモ（日本語・任意）</div><input type="text" data-inp="mJa" data-k="mj" value="${esc(t.ja)}"></div>
      <div class="row" style="gap:10px;align-items:flex-start">
        <div class="sp"><div class="eb">抽選ウェイト</div><input type="number" step="0.5" min="0" value="${t.w}" data-inp="mW" style="width:100%">
          <div class="mini">大きいほど出やすい（既定 1）</div></div>
        <div class="sp"><div class="eb">強調</div><input type="number" step="0.05" min="0.1" max="2" value="${t.emph}" data-inp="mE" style="width:100%">
          <div class="mini">1以外なら (tag:1.2) 形式</div></div>
      </div>
      <div><div class="eb">所属グループ</div><select data-sel="mGid" style="width:100%">
        ${D.groups.map(x=>`<option value="${x.id}"${x.id===m.gid?" selected":""}>${esc(x.name)}</option>`).join("")}</select></div>
      <div class="row" style="background:var(--ink3);border-radius:8px;padding:9px 12px">
        <span class="sp" style="font-size:13px">抽選に含める</span>${sw(t.on,"mOn")}</div>
      <div class="row" style="background:var(--ink3);border-radius:8px;padding:9px 12px;border:1px solid ${t.fix?"var(--brass)":"transparent"}">
        <span style="flex:none">📌</span>
        <div class="sp"><div style="font-size:13px;font-weight:700;color:${t.fix?"var(--brass)":"var(--txt)"}">固定</div>
          <div class="mini">抽選せず、毎回かならずプロンプトに入る</div></div>${sw(!!t.fix,"mFix")}</div>
      <div class="row" style="gap:8px">
        <button class="btn ng" data-act="delTag">🗑 削除</button>
        <button class="btn lever full" data-act="closeModal">閉じる</button></div>`);
  }

  if(m.type==="rule"){
    const r=m.draft, ex=r.type==="exclude";
    return sheet(m.isNew?"ルールを追加":"ルールを編集",`
      <div><div class="eb">種類</div><div class="row" style="gap:8px">
        <button class="btn full ${ex?"ng":""}" data-act="rType" data-v="exclude">⊘ 排他（出さない）</button>
        <button class="btn full" data-act="rType" data-v="link" style="${!ex?"background:var(--linkbg);color:var(--link);border-color:var(--link)":""}">🔗 連動（一緒に出す）</button>
      </div></div>
      <div><div class="eb">これが出たら</div>
        ${r.a?`<div class="row" style="gap:8px"><span class="tgt src sp${r.a.k==="group"?" g":""}" style="padding:9px 11px">${esc(refLabel(r.a))}</span>
          <button class="btn" data-act="pickA">✎</button></div>`
        :`<button class="btn full" data-act="pickA">＋ 起点を選ぶ</button>`}</div>
      <div><div class="eb">${ex?"これは出さない（複数可）":"これも一緒に出す（複数可）"}</div>
        <div class="chips" style="margin-bottom:8px">${r.targets.map((t,i)=>
          `<span class="tgt ${ex?"ex":"lk"}${t.k==="group"?" g":""}">${esc(refLabel(t))}
            <button data-act="rmTarget" data-i="${i}" style="color:inherit">✕</button></span>`).join("")}</div>
        <button class="btn full" data-act="pickT">＋ 対象を追加</button></div>
      ${ex?`<div><div class="eb">方向</div><div class="row" style="gap:8px">
        <button class="btn full ${r.dir==="both"?"solid":""}" data-act="rDir" data-v="both">双方向 ⟷</button>
        <button class="btn full ${r.dir==="a2b"?"solid":""}" data-act="rDir" data-v="a2b">片方向 →</button></div>
        <div class="mini" style="margin-top:6px">双方向 = どちらが先に出ても、もう片方を止める。<br>片方向 = 起点が出たときだけ対象を止める。<br>
        <span style="color:var(--brass)">抽選はグループの並び順（上から）で行われます。</span></div></div>`:""}
      <div class="row" style="gap:8px">
        ${m.isNew?"":`<button class="btn ng" data-act="delRule">🗑 削除</button>`}
        <button class="btn lever full" data-act="saveRule"${(r.a&&r.targets.length)?"":" disabled"}>保存</button></div>`);
  }

  if(m.type==="ref"){
    const lq=(m.q||"").trim().toLowerCase();
    let body=`<div class="row" style="gap:8px">
      <button class="btn full ${m.mode==="tag"?"solid":""}" data-act="refMode" data-v="tag">単語</button>
      <button class="btn full ${m.mode==="group"?"solid":""}" data-act="refMode" data-v="group">グループ</button></div>
      <input type="text" data-inp="refQ" data-k="refq" placeholder="検索" value="${esc(m.q||"")}">`;
    if(m.mode==="group"){
      body+=`<div class="col" style="gap:5px">`+D.groups.filter(g=>!lq||g.name.toLowerCase().includes(lq))
        .map(g=>`<button class="pickrow" data-act="refPick" data-k2="group" data-id="${g.id}">
          <span class="sp">［${esc(g.name)}］</span><span class="mini mono">${g.tags.length}語</span></button>`).join("")+`</div>`;
    }else{
      let budget=180,cut=0,out="";
      for(const g of D.groups){
        const hits=g.tags.filter(t=>!lq||t.tag.toLowerCase().includes(lq)||(t.ja||"").toLowerCase().includes(lq));
        if(!hits.length) continue;
        const take=Math.max(0,Math.min(hits.length,budget));
        cut+=hits.length-take; budget-=take;
        if(take>0) out+=`<div><div class="eb">${esc(g.name)}</div><div class="chips">`+
          hits.slice(0,take).map(t=>`<button class="chip" data-act="refPick" data-k2="tag" data-id="${t.id}">${esc(t.tag)}</button>`).join("")+`</div></div>`;
      }
      body+=`<div class="col">${out}</div>`;
      if(cut>0) body+=`<div class="ph">あと ${cut} 語あります。検索で絞ってください。</div>`;
    }
    return sheet("単語 / グループを選ぶ",body);
  }

  if(m.type==="ukpick"){
    return sheet("「"+m.n+"」の行き先",
      `<div class="col" style="gap:5px">
        <button class="pickrow" data-act="ukSet" data-n="${esc(m.n)}" data-gid="__new">＋ 新しいグループ（${esc(V.pNewName)}）</button>
        ${D.groups.map(g=>`<button class="pickrow" data-act="ukSet" data-n="${esc(m.n)}" data-gid="${g.id}">
          <span class="sp">${esc(g.name)}</span><span class="mini mono">${g.tags.length}</span></button>`).join("")}
      </div>`);
  }
  return "";
}

/* ══════════ render ══════════ */
function showErr(msg){
  V.lastErr=String(msg);
  const box=$("errbox");
  if(!box) return;
  box.innerHTML=`<div class="wrap" style="padding-top:10px"><div class="err">
    <div class="row" style="align-items:flex-start">
      <div class="sp" style="white-space:pre-wrap">${esc(V.lastErr)}</div>
      <button data-act="copyErr" style="color:var(--ng);font-weight:700;flex:none">コピー</button>
      <button data-act="hideErr" style="color:var(--ng);flex:none">✕</button>
    </div></div></div>`;
}
function render(){
  try{ render_(); }
  catch(e){ showErr("render: "+(e&&e.message)+"\n"+((e&&e.stack)||"").split("\n").slice(1,3).join("\n")); }
}
function render_(){
  const act=document.activeElement;
  const fk=act&&act.dataset?act.dataset.k:null;
  const ss=act&&act.selectionStart, se=act&&act.selectionEnd;
  const sy=window.scrollY;

  $("stat").innerHTML=`<div>${stats().g} groups</div><div><b>${stats().t} tags</b></div>`;
  $("save").className="save"+(V.dirty?" on":"");
  $("nav").innerHTML=TABS.map(([id,l])=>`<button class="${V.tab===id?"sel":""}" data-act="tab" data-t="${id}">${l}</button>`).join("");

  let body="";
  if(V.toast) body+=`<div class="toast">✦ ${esc(V.toast)}</div>`;
  body+= V.tab==="gen"?viewGen(): V.tab==="groups"?viewGroups(): V.tab==="rules"?viewRules():
         V.tab==="import"?viewImport(): V.tab==="hist"?viewHist(): viewSet();
  $("app").innerHTML=body;

  $("lever").innerHTML = V.tab==="gen"
    ? `<div class="lever"><div class="wrap">
        <button class="btn lever lg full" data-act="roll">🎲 抽選する</button>
        <button class="btn solid lg" data-act="copyPrompt"${prompt()?"":" disabled"}>⧉</button></div></div>` : "";

  const mo=$("modal");
  if(V.modal){ mo.className=""; mo.innerHTML=viewModal(); } else { mo.className="hide"; mo.innerHTML=""; }

  if(fk){
    const el=document.querySelector('[data-k="'+fk+'"]');
    if(el){ el.focus(); try{ el.setSelectionRange(ss,se); }catch(e){} }
  }
  window.scrollTo(0,sy);
}

/* ══════════ 操作 ══════════ */
const G=id=>D.groups.find(g=>g.id===id);

const ACT={
  tab:(d)=>{ V.tab=d.t; render(); window.scrollTo(0,0); },
  backup:()=>{ copy(JSON.stringify(D,null,2)); V.dirty=false; render(); },
  download:()=>{
    try{
      const b=new Blob([JSON.stringify(D,null,2)],{type:"application/json"});
      const a=document.createElement("a");
      a.href=URL.createObjectURL(b); a.download="tag-gacha.json"; a.click();
      setTimeout(()=>URL.revokeObjectURL(a.href),1000);
      V.dirty=false; say("書き出しました");
    }catch(e){ say("書き出せません。JSONをコピーして"); }
  },
  restore:()=>{
    try{
      const d=JSON.parse(V.impText);
      if(!d.groups||!d.groups.length) throw 0;
      d.settings={...DEFAULT_SETTINGS,...(d.settings||{})};
      d.rules=d.rules||[]; d.history=d.history||[];
      D=d; V.result=null; V.locks={}; V.impText=""; V.fresh=false;
      persist(); say("復元しました"); render();
    }catch(e){ say("JSONの形式が違います"); }
  },
  reset:()=>{ V.modal={type:"confirm",msg:"すべて初期状態に戻します。取り込んだ単語も消えます。",yes:"reset2"}; render(); },
  reset2:()=>{ D=buildDefaults(); V.result=null; V.locks={}; persist(); say("初期化しました"); },
  dismissFresh:()=>{ V.fresh=false; render(); },
  toggleFixBox:()=>{ V.fixOpen=!V.fixOpen; render(); },

  roll:()=>{ V.result=generate(D,V.locks,V.result); pushHistory(); render(); },
  resyncChars:()=>{ V.modal={type:"confirm",msg:"同梱キャラのリストを最新版に差し替えます。\n自分で追加したグループ・保存キャラ・取り込んだキャラは残ります。",yes:"resyncChars2"}; render(); },
  resyncChars2:()=>mutate(()=>{
    const names=new Set(CHARS.map(c=>c[0]));
    const prevOn={};
    let at=D.groups.findIndex(g=>g.char&&!g.look&&names.has(g.name));
    D.groups.forEach(g=>{ if(g.char&&!g.look&&names.has(g.name)) prevOn[g.name]=g.on; });
    D.groups=D.groups.filter(g=>!(g.char&&!g.look&&names.has(g.name)));
    if(at<0) at=D.groups.length;
    const fresh=CHARS.map(([jp,cp,list])=>{
      const tags=list.map(s=>{const[t,ja]=s.split("|");return{id:uid(),tag:t.trim().replace(/_/g," "),ja:(ja||"").trim(),w:1,emph:1,on:true,fix:false};});
      tags.push({id:uid(),tag:cp.replace(/_/g," "),ja:"作品タグ",w:1,emph:1,on:true,fix:true});
      return {id:uid(),name:jp,min:1,max:1,on:!!prevOn[jp],req:false,mode:"roll",setOn:false,char:true,look:false,tags};
    });
    D.groups.splice(at,0,...fresh);
    pruneRules();
    V.toast=`同梱キャラを差し替えました（${CHARS.length}作品）`;
  }),
  saveLook:()=>{
    if(!V.result){ say("先に「抽選する」を押して"); return; }
    const keep=new Set(String(D.settings.lookGroups||"").split(",").map(s=>s.trim()).filter(Boolean));
    const tags=[], seen=new Set();
    for(const g of D.groups){
      if(g.look) continue;
      if(!keep.has(g.name)&&!g.char) continue;
      for(const t of (V.result.byGroup[g.id]||[])){
        const k=norm(t.tag);
        if(seen.has(k)) continue;
        seen.add(k);
        tags.push({id:uid(),tag:t.tag,ja:t.ja||"",w:1,emph:Number(t.emph)||1,on:true,fix:true});
      }
    }
    if(!tags.length){ say("外見タグが見つかりません"); return; }
    const dt=new Date();
    const nm=`保存キャラ ${dt.getMonth()+1}/${dt.getDate()} ${String(dt.getHours()).padStart(2,"0")}:${String(dt.getMinutes()).padStart(2,"0")}`;
    mutate(()=>{
      const g={id:uid(),name:nm,min:0,max:0,on:true,req:false,mode:"set",setOn:true,char:true,look:true,tags};
      D.groups.forEach(x=>{ if(x.char&&x.mode==="set") x.setOn=false; });
      g.setOn=true;
      D.groups.splice(1,0,g);
      V.result=generate(D,V.locks,V.result);
      V.toast=tags.length+"個の外見タグを保存しました";
    });
  },
  lockAll:(d)=>{
    V.locks={};
    if(d.v==="1") for(const g of D.groups) if(g.on&&g.mode!=="set") V.locks[g.id]=true;
    render();
  },
  histFav:(d)=>mutate(()=>{ const it=D.history.find(x=>x.id===d.id); if(it) it.fav=!it.fav; }),
  histDel:(d)=>mutate(()=>{ D.history=D.history.filter(x=>x.id!==d.id); }),
  histCopy:(d)=>{ const it=(D.history||[]).find(x=>x.id===d.id); if(it) copy(it.p); },
  histLoad:(d)=>{
    const it=(D.history||[]).find(x=>x.id===d.id);
    if(!it) return;
    V.result={byGroup:JSON.parse(JSON.stringify(it.r))};
    V.locks={};
    Object.keys(it.r).forEach(k=>{ V.locks[k]=true; });
    V.tab="gen"; say("呼び戻しました（全ロック済み）");
    window.scrollTo(0,0);
  },
  histClear:()=>{ V.modal={type:"confirm",msg:"★を付けてない履歴を全部消します。",yes:"histClear2"}; render(); },
  histClear2:()=>mutate(()=>{ D.history=(D.history||[]).filter(x=>x.fav); }),
  dedupe:()=>mutate(()=>{ D.settings.dedupe=!D.settings.dedupe; }),
  reroll:(d)=>{ V.result=V.result?rerollOne(D,V.result,d.id):generate(D,{},null); render(); },
  lock:(d)=>{ V.locks[d.id]=!V.locks[d.id]; render(); },
  dropTag:(d)=>{ if(!V.result) return;
    V.result={byGroup:{...V.result.byGroup,[d.id]:(V.result.byGroup[d.id]||[]).filter(t=>t.id!==d.tid)}}; render(); },
  copyPrompt:()=>copy(prompt()),
  copyNeg:()=>copy(D.settings.negative),
  batch:()=>{ const n=clamp(Number(D.settings.batch)||5,1,30);
    V.batchOut=Array.from({length:n},()=>toPrompt(D,generate(D,{},null))); say(n+"件つくりました"); },
  copyBatch:()=>copy(V.batchOut.join("\n\n")),
  copyOne:(d)=>copy(V.batchOut[+d.i]),

  gOn:(d)=>mutate(()=>{ const g=G(d.id); g.on=!g.on; }),
  gReq:(d)=>mutate(()=>{ const g=G(d.id); g.req=!g.req; }),
  gMode:(d)=>mutate(()=>{
    const g=G(d.id);
    g.mode = g.mode==="set" ? "roll" : "set";
    if(g.mode==="set"){ g.req=false; g.setOn=false; }
    if(V.result) V.result.byGroup[g.id]=[];
  }),
  setToggle:(d)=>{
    const g=G(d.id);
    g.setOn=!g.setOn;
    if(g.setOn&&g.char) D.groups.forEach(x=>{ if(x.char&&x.mode==="set"&&x.id!==g.id&&x.setOn){ x.setOn=false; if(V.result) V.result.byGroup[x.id]=[]; } });
    if(!V.result) V.result={byGroup:{}};
    V.result={byGroup:{...V.result.byGroup,[g.id]: g.setOn ? g.tags.filter(t=>t.on) : []}};
    V.dirty=true; persist(); render();
  },
  cycle:(d)=>{
    const g=G(d.id);
    if(!g||!V.result) return;
    const cur=V.result.byGroup[g.id]||[];
    const i=cur.findIndex(t=>t.id===d.tid);
    if(i<0) return;
    const t=cur[i];
    // 固定タグは「固定の付け替え」、通常タグは結果の差し替え
    const pool=g.tags.filter(x=>x.on&&(t.fix||!x.fix));
    const k=pool.findIndex(x=>x.id===t.id);
    if(k<0||pool.length<2) return;
    const step=Number(d.d)||1;
    const nx=pool[(k+step+pool.length*2)%pool.length];
    if(t.fix){ t.fix=false; nx.fix=true; V.dirty=true; persist(); }
    const arr=[...cur]; arr[i]=nx;
    V.result={byGroup:{...V.result.byGroup,[g.id]:arr}};
    render();
  },
  toggleG:(d)=>{ V.openG[d.id]=!V.openG[d.id]; render(); },
  reorder:()=>{ V.reorder=!V.reorder; V.moving=null; render(); window.scrollTo(0,0); },
  pick:(d)=>{ V.moving = V.moving===d.id ? null : d.id; render(); },
  cancelMove:()=>{ V.moving=null; render(); },
  dropAt:(d)=>{
    if(!V.moving||V.moving===d.id){ V.moving=null; render(); return; }
    mutate(()=>{
      const from=D.groups.findIndex(g=>g.id===V.moving);
      const [g]=D.groups.splice(from,1);
      const to=D.groups.findIndex(x=>x.id===d.id);
      D.groups.splice(to<0?D.groups.length:to,0,g);
      V.moving=null;
    });
  },
  dropEnd:()=>{
    if(!V.moving) return;
    mutate(()=>{
      const i=D.groups.findIndex(g=>g.id===V.moving);
      const [g]=D.groups.splice(i,1);
      D.groups.push(g);
      V.moving=null;
    });
  },
  gTop:(d)=>mutate(()=>{ const i=D.groups.findIndex(g=>g.id===d.id); const [g]=D.groups.splice(i,1); D.groups.unshift(g); }),
  gBottom:(d)=>mutate(()=>{ const i=D.groups.findIndex(g=>g.id===d.id); const [g]=D.groups.splice(i,1); D.groups.push(g); }),
  moveUp:(d)=>mutate(()=>{ const i=+d.i; if(i>0){ const a=D.groups; [a[i-1],a[i]]=[a[i],a[i-1]]; } }),
  moveDn:(d)=>mutate(()=>{ const i=+d.i; const a=D.groups; if(i<a.length-1){ [a[i+1],a[i]]=[a[i],a[i+1]]; } }),
  delG:(d)=>{ V.modal={type:"confirm",msg:"「"+G(d.id).name+"」を削除します。",yes:"delG2",id:d.id}; render(); },
  delG2:()=>mutate(()=>{ D.groups=D.groups.filter(g=>g.id!==V.modal.id); pruneRules(); }),
  addGroup:()=>mutate(()=>{ const g={id:uid(),name:"新しいグループ",min:0,max:1,on:true,req:false,tags:[]};
    D.groups.push(g); V.openG[g.id]=true; }),
  more:(d)=>{ V.limitG[d.id]=(V.limitG[d.id]||120)+240; render(); },
  clearQ:()=>{ V.q=""; render(); },
  fixAll:(d)=>mutate(()=>{ G(d.id).tags.forEach(t=>t.fix=true); }),
  unfixAll:(d)=>mutate(()=>{ G(d.id).tags.forEach(t=>t.fix=false); }),
  openAdd:(d)=>{ V.addTo=d.id; V.bulk=""; render(); },
  cancelAdd:()=>{ V.addTo=null; V.bulk=""; render(); },
  bulkComma:()=>{ V.bulkComma=!V.bulkComma; render(); },
  sugPick:(d)=>{
    const cut=Math.max(V.bulk.lastIndexOf(","),V.bulk.lastIndexOf("\n"));
    V.bulk=(cut>=0?V.bulk.slice(0,cut+1)+" ":"")+d.v+", ";
    render();
    const el=document.querySelector('[data-k="bulk"]');
    if(el){ el.focus(); try{ el.setSelectionRange(el.value.length,el.value.length); }catch(e){} }
  },
  doAdd:(d)=>{
    const rows=V.bulk.split(V.bulkComma?/[\n]/:/\n/).map(s=>s.trim()).filter(Boolean);
    if(!rows.length) return;
    mutate(()=>{
      const g=G(d.id);
      const have=new Set(g.tags.map(t=>t.tag.toLowerCase()));
      let n=0;
      for(const row of rows){
        const [tg,ja]=row.split("|");
        const name=(tg||"").trim();
        if(!name||have.has(name.toLowerCase())) continue;
        have.add(name.toLowerCase());
        g.tags.push({id:uid(),tag:name,ja:(ja||"").trim(),w:1,emph:1,on:true,fix:false}); n++;
      }
      V.addTo=null; V.bulk=""; V.toast=n+"語を追加しました";
    });
  },
  editTag:(d)=>{ V.modal={type:"tag",gid:d.id,tid:d.tid}; render(); },
  mOn:()=>mutate(()=>{ const g=G(V.modal.gid),t=g.tags.find(x=>x.id===V.modal.tid); t.on=!t.on; }),
  mFix:()=>mutate(()=>{ const g=G(V.modal.gid),t=g.tags.find(x=>x.id===V.modal.tid); t.fix=!t.fix; }),
  delTag:()=>mutate(()=>{ const g=G(V.modal.gid); g.tags=g.tags.filter(t=>t.id!==V.modal.tid); pruneRules(); V.modal=null; }),

  rulePreset:(d)=>{
    const gid=nm=>{ const g=D.groups.find(x=>x.name===nm); return g?g.id:null; };
    const tid=(gn,tn)=>{ const g=D.groups.find(x=>x.name===gn); if(!g) return null; const t=g.tags.find(x=>norm(x.tag)===norm(tn)); return t?t.id:null; };
    let rule=null;
    if(d.p==="catset"){
      const a=tid("種族・獣要素","cat ears");
      const tail=tid("種族・獣要素","cat tail"), fluff=tid("種族・獣要素","animal ear fluff");
      if(a&&tail) rule={id:uid(),type:"link",dir:"a2b",qty:"one",a:{k:"tag",id:a},
        targets:[{k:"tag",id:tail}].concat(fluff?[{k:"tag",id:fluff}]:[])};
    }else if(d.p==="closedeyes"){
      const a=tid("目の形","closed eyes");
      if(a) rule={id:uid(),type:"exclude",dir:"a2b",a:{k:"tag",id:a},
        targets:[gid("瞳の色"),gid("瞳孔・光"),gid("視線")].filter(Boolean).map(id=>({k:"group",id}))};
    }else if(d.p==="behind"){
      const a=tid("構図・カメラ","from behind");
      if(a) rule={id:uid(),type:"exclude",dir:"a2b",a:{k:"tag",id:a},
        targets:[gid("表情"),gid("目の形"),gid("視線"),gid("瞳の色"),gid("顔の特徴・ほくろ")].filter(Boolean).map(id=>({k:"group",id}))};
    }else if(d.p==="charframe"){
      const t=tid("構図・カメラ","full body");
      if(t) rule={id:uid(),type:"link",dir:"a2b",qty:"one",a:{k:"char",id:"any"},targets:[{k:"tag",id:t}]};
    }
    if(!rule||!rule.a.id||!rule.targets.length){ say("必要なタグ/グループが見つかりません"); return; }
    // 重複チェック（同じ起点・同じ種別）
    if(D.rules.some(r=>r.type===rule.type&&JSON.stringify(r.a)===JSON.stringify(rule.a))){ say("似たルールが既にあります"); return; }
    mutate(()=>{ D.rules.push(rule); V.toast="ルールを追加しました"; });
  },
  newRule:()=>{ V.modal={type:"rule",isNew:true,draft:{id:uid(),type:"exclude",dir:"both",qty:"one",a:null,targets:[]}}; render(); },
  editRule:(d)=>{ const r=D.rules.find(x=>x.id===d.id);
    V.modal={type:"rule",isNew:false,draft:JSON.parse(JSON.stringify(r))}; render(); },
  rType:(d)=>{ V.modal.draft.type=d.v; if(d.v==="link"){ V.modal.draft.dir="a2b"; if(!V.modal.draft.qty) V.modal.draft.qty="one"; } render(); },
  rQty:(d)=>{ V.modal.draft.qty=d.v; render(); },
  rDir:(d)=>{ V.modal.draft.dir=d.v; render(); },
  rmTarget:(d)=>{ V.modal.draft.targets.splice(+d.i,1); render(); },
  pickA:()=>{ V.modal={...V.modal,ref:"a",_back:{...V.modal}}; V.modal={type:"ref",mode:"tag",q:"",back:V.modal._back,slot:"a"}; render(); },
  pickT:()=>{ V.modal={type:"ref",mode:"tag",q:"",back:{...V.modal},slot:"t"}; render(); },
  refMode:(d)=>{ V.modal.mode=d.v; V.modal.q=""; render(); },
  refPick:(d)=>{
    const back=V.modal.back, slot=V.modal.slot;
    const ref = d.k2==="char" ? {k:"char",id:"any"} : {k:d.k2,id:d.id};
    if(slot==="a") back.draft.a=ref;
    else if(!back.draft.targets.some(t=>t.k===ref.k&&t.id===ref.id)) back.draft.targets.push(ref);
    V.modal=back; render();
  },
  saveRule:()=>mutate(()=>{
    const r=V.modal.draft;
    const i=D.rules.findIndex(x=>x.id===r.id);
    if(i>=0) D.rules[i]=r; else D.rules.push(r);
    V.modal=null; V.toast="ルールを保存しました";
  }),
  delRule:()=>mutate(()=>{ D.rules=D.rules.filter(x=>x.id!==V.modal.draft.id); V.modal=null; }),

  impMode:(d)=>{ V.impMode=d.m; render(); },
  chPre:(d)=>{ V.chSeries=d.v; render(); },
  chCopyURL:()=>copy(relURL(V.chSeries,200)),
  chCopyAllURL:()=>copy(charAllURL(1)),
  chCopy:()=>{ V.chCopy=!V.chCopy; render(); },
  chAll:()=>{ V.chAll=!V.chAll; render(); },
  chWeight:()=>{ V.chWeight=!V.chWeight; render(); },
  chClear:()=>{ V.chPool=[]; render(); },
  chFetch:async()=>{
    V.chErr=""; V.chBusy="取得中…"; render();
    try{
      const res=await fetch(relURL(V.chSeries,200));
      if(!res.ok) throw new Error("HTTP "+res.status);
      const rows=harvestTags(await res.json(),4);
      if(!rows.length) throw new Error("キャラが見つかりません");
      chAddPool(rows); V.chBusy=""; say(rows.length+"人を取得しました");
    }catch(e){
      V.chBusy="";
      V.chErr="直接取得できませんでした（CORS制限か、作品タグが違う）。下のURLを開いてJSONを全部コピーし、貼り付け欄にペーストしてください。";
      render();
    }
  },
  chFetchAll:async()=>{
    V.chErr=""; V.chBusy="接続中…"; render();
    const rows=[];
    try{
      for(let p=1;p<=V.chPages;p++){
        V.chBusy=`取得中… ${p}/${V.chPages}`; render();
        const res=await fetch(charAllURL(p));
        if(!res.ok) throw new Error("HTTP "+res.status);
        const j=await res.json();
        if(!Array.isArray(j)||!j.length) break;
        rows.push(...harvestTags(j,4));
        await new Promise(r=>setTimeout(r,350));
      }
      chAddPool(rows); V.chBusy=""; say(rows.length+"人を取得しました");
    }catch(e){
      V.chBusy="";
      V.chErr="直接取得できませんでした（CORS制限）。下のURLを開いてJSONを全部コピーし、貼り付け欄にペーストしてください。";
      render();
    }
  },
  chParse:()=>{
    try{
      const rows=harvestTags(JSON.parse(V.chPaste),4);
      if(!rows.length) throw 0;
      chAddPool(rows); V.chPaste=""; V.chErr=""; say(rows.length+"人を読み込みました");
    }catch(e){ V.chErr="解析できません。JSONを丸ごと貼ってください（キャラタグが1人も入ってない可能性も）。"; render(); }
  },
  chCommit:()=>{
    const pc=planChars(V.chPool,{minCount:V.chMin,minChars:V.chMinChars});
    if(!pc.total){ say("取り込めるキャラがいません"); return; }
    const mk=(n,c)=>({id:uid(),tag:n,ja:"",w:V.chWeight?logWeight(c):1,emph:1,on:true,fix:false});
    const getG=nm=>{
      let g=D.groups.find(x=>x.name===nm&&x.char);
      if(!g){ g={id:uid(),name:nm,min:1,max:1,on:false,req:false,mode:"roll",setOn:false,char:true,tags:[]}; D.groups.push(g); }
      return g;
    };
    const fill=(g,arr)=>{
      const have=new Set(g.tags.map(t=>norm(t.tag)));
      for(const it of arr) if(!have.has(norm(it.name))){ g.tags.push(mk(it.name,it.count)); have.add(norm(it.name)); }
    };
    mutate(()=>{
      const all=[];
      for(const [s,arr] of pc.bySeries){
        const g=getG(s);
        fill(g,arr);
        if(V.chCopy&&!g.tags.some(t=>norm(t.tag)===norm(s)))
          g.tags.push({id:uid(),tag:s,ja:"作品タグ",w:1,emph:1,on:true,fix:true});
        all.push(...arr);
      }
      if(pc.other.length){ fill(getG("その他キャラ"),pc.other); all.push(...pc.other); }
      if(V.chAll&&all.length) fill(getG("全キャラ"),all);
      V.chPool=[];
      V.toast=pc.total+"キャラを取り込みました";
    });
  },
  hideOff:()=>{ V.hideOff=!V.hideOff; render(); },
  copyDbURL:()=>copy(dbURL(V.dbCat,1)),
  copyPURL:()=>copy(V.pURL),
  dbFetch:async()=>{
    V.dbErr=""; V.dbBusy="接続中…"; render();
    const rows=[];
    try{
      for(let p=1;p<=V.dbPages;p++){
        V.dbBusy=`取得中… ${p}/${V.dbPages}`; render();
        const res=await fetch(dbURL(V.dbCat,p));
        if(!res.ok) throw new Error("HTTP "+res.status);
        const j=await res.json();
        if(!Array.isArray(j)||!j.length) break;
        rows.push(...parseTagPayload(JSON.stringify(j)));
        await new Promise(r=>setTimeout(r,350));
      }
      addPool(rows); V.dbBusy=""; say(rows.length+"語を取得しました");
    }catch(e){
      V.dbBusy="";
      V.dbErr="直接取得できませんでした（danbooru 側のCORS制限）。下のURLを開いて、中身を全選択コピー → 貼り付け欄にペーストしてください。";
      render();
    }
  },
  dbParse:()=>{
    try{
      const rows=parseTagPayload(V.dbPaste);
      if(!rows.length) throw 0;
      addPool(rows); V.dbPaste=""; V.dbErr=""; say(rows.length+"語を読み込みました");
    }catch(e){ V.dbErr="解析できません。tags.json の中身（[{...}] の配列）を丸ごと貼ってください。"; render(); }
  },
  dbWeight:()=>{ V.dbWeight=!V.dbWeight; render(); },
  dbClear:()=>{ V.dbPool=[]; render(); },
  dbCommit:()=>{
    const plan=planImport(V.dbPool,D,{minCount:V.dbMin,block:V.dbBlock,useWeight:V.dbWeight});
    if(!plan.keep.length){ say("追加できる単語がありません"); return; }
    const clean=plan.keep.map(({pc,...t})=>t);
    mutate(()=>{
      if(V.dbTarget==="__new") D.groups.push({id:uid(),name:V.dbNewName||"danbooru 取込",min:0,max:1,on:true,req:false,tags:clean});
      else G(V.dbTarget).tags.push(...clean);
      V.dbPool=[]; V.toast=clean.length+"語を追加しました";
    });
  },

  loadPost:async()=>{
    V.pErr=""; V.pTags=null; V.pURL=""; V.pPick={};
    const raw=V.pSrc.trim();
    if(!raw) return;
    const id=extractPostId(raw);
    if(id){
      const url=postURL(id);
      V.pURL=url; V.pBusy="取得中…"; render();
      try{
        const res=await fetch(url);
        if(!res.ok) throw new Error(String(res.status));
        V.pTags=postToTags(await res.json());
        V.pBusy=""; autoRoute(); say("post "+id+" を読みました");
      }catch(e){
        V.pBusy="";
        V.pErr="直接取得できませんでした（CORS制限）。下のリンクでJSONを開いて、中身を全部コピーしてここに貼ってください。";
        render();
      }
      return;
    }
    try{
      const t=parseAnySource(raw);
      if(!t||!t.general.length) throw 0;
      V.pTags=t; autoRoute(); say(t.general.length+"語を読みました");
    }catch(e){
      V.pErr="読めません。post のURL / ID、posts/xxx.json の中身、またはプロンプト文字列を入れてください。";
      render();
    }
  },
  pAuto:()=>{ V.pAuto=!V.pAuto; autoRoute(); render(); },
  pickAll:(d)=>{ const on=d.v==="1"; Object.keys(V.pPick).forEach(k=>V.pPick[k].on=on); render(); },
  ukToggle:(d)=>{ const v=V.pPick[d.n]||{on:true,gid:"__new"}; v.on=!v.on; V.pPick[d.n]=v; render(); },
  ukPick:(d)=>{ V.modal={type:"ukpick",n:d.n}; render(); },
  ukSet:(d)=>{ const v=V.pPick[d.n]||{on:true,gid:"__new"}; v.gid=d.gid; V.pPick[d.n]=v; V.modal=null; render(); },
  addSelected:()=>{
    const chosen=Object.entries(V.pPick).filter(([,v])=>v.on);
    if(!chosen.length) return;
    mutate(()=>{
      const bucket={};
      for(const [name,v] of chosen){
        (bucket[v.gid]=bucket[v.gid]||[]).push({id:uid(),tag:name,ja:"",w:1,emph:1,on:true,fix:false});
      }
      for(const gid of Object.keys(bucket)){
        if(gid==="__new") D.groups.push({id:uid(),name:V.pNewName||"参考画像から",min:0,max:1,on:true,req:false,tags:bucket.__new});
        else { const g=G(gid); if(g) g.tags.push(...bucket[gid]); }
      }
      V.toast=chosen.length+"語を追加しました";
    });
    autoRoute();
  },
  applyRecipe:()=>{
    const rec=buildRecipe(V.pTags.general,D);
    V.result={byGroup:rec.byGroup};
    V.locks={};
    Object.keys(rec.byGroup).forEach(k=>{ V.locks[k]=true; });
    V.tab="gen"; say("型として読み込みました");
    window.scrollTo(0,0);
  },

  escP:()=>mutate(()=>{ D.settings.escapeParens=!D.settings.escapeParens; }),
  autoFrame:()=>mutate(()=>{ D.settings.autoFrame=!D.settings.autoFrame; }),
  charSup:()=>mutate(()=>{ D.settings.charSuppress=!D.settings.charSuppress; }),
  under:()=>mutate(()=>{ D.settings.underscore=!D.settings.underscore; }),

  copyErr:()=>copy(V.lastErr||""),
  hideErr:()=>{ const b=$("errbox"); if(b) b.innerHTML=""; },
  closeModal:()=>{ V.modal=null; render(); },
  confirmYes:()=>{ const y=V.modal.yes; ACT[y](); if(V.modal&&V.modal.type==="confirm") V.modal=null; render(); }
};

function chAddPool(rows){
  const seen=new Set(V.chPool.map(x=>x.name));
  for(const r of rows) if(r.name&&!seen.has(r.name)){ seen.add(r.name); V.chPool.push(r); }
}
function addPool(rows){
  const seen=new Set(V.dbPool.map(x=>x.name));
  for(const r of rows) if(r.name&&!seen.has(r.name)){ seen.add(r.name); V.dbPool.push(r); }
}
function autoRoute(){
  V.pPick={};
  if(!V.pTags) { render(); return; }
  const rec=buildRecipe(V.pTags.general,D);
  const idx=buildWordIndex(D);
  for(const n of rec.unknown) V.pPick[n]={on:true,gid:(V.pAuto&&guessGroup(n,idx))||"__new"};
  render();
}
function pruneRules(){
  const gi=new Set(D.groups.map(g=>g.id));
  const ti=new Set(D.groups.flatMap(g=>g.tags.map(t=>t.id)));
  const alive=r=>r.k==="group"?gi.has(r.id):ti.has(r.id);
  D.rules=D.rules.map(r=>({...r,targets:r.targets.filter(alive)}))
                 .filter(r=>r.a&&alive(r.a)&&r.targets.length);
}

const INP={
  q:v=>{ V.q=v; render(); },
  bulk:v=>{ V.bulk=v; refreshSug(); },
  impText:v=>{ const was=!!V.impText.trim(); V.impText=v; if(was!==!!v.trim()) render(); },
  batch:v=>{ D.settings.batch=clamp(Number(v)||1,1,30); persist(); },
  prefix:v=>{ D.settings.prefix=v; V.dirty=true; persist(); refreshOut(); },
  suffix:v=>{ D.settings.suffix=v; V.dirty=true; persist(); refreshOut(); },
  negative:v=>{ D.settings.negative=v; V.dirty=true; persist(); },
  frameFull:v=>{ D.settings.frameFull=v; V.dirty=true; persist(); },
  frameCowboy:v=>{ D.settings.frameCowboy=v; V.dirty=true; persist(); },
  charBlock:v=>{ D.settings.charBlock=v; V.dirty=true; persist(); },
  lookGroups:v=>{ D.settings.lookGroups=v; V.dirty=true; persist(); },
  ng:v=>{ D.settings.ng=v; V.dirty=true; persist(); refreshOut(); },
  histQ:v=>{ V.histQ=v; render(); },
  gname:(v,d)=>{ G(d.id).name=v; V.dirty=true; persist(); },
  mTag:v=>{ const g=G(V.modal.gid),t=g.tags.find(x=>x.id===V.modal.tid); t.tag=v; V.dirty=true; persist(); },
  mJa:v=>{ const g=G(V.modal.gid),t=g.tags.find(x=>x.id===V.modal.tid); t.ja=v; V.dirty=true; persist(); },
  mW:v=>{ const g=G(V.modal.gid),t=g.tags.find(x=>x.id===V.modal.tid); t.w=Number(v)||0; V.dirty=true; persist(); },
  mE:v=>{ const g=G(V.modal.gid),t=g.tags.find(x=>x.id===V.modal.tid); t.emph=Number(v)||1; V.dirty=true; persist(); },
  dbPages:v=>{ V.dbPages=clamp(Number(v)||1,1,20); },
  dbPaste:v=>{ const was=!!V.dbPaste.trim(); V.dbPaste=v; if(was!==!!v.trim()) render(); },
  dbMin:v=>{ V.dbMin=Math.max(0,Number(v)||0); render(); },
  dbBlock:v=>{ V.dbBlock=v; },
  dbNewName:v=>{ V.dbNewName=v; },
  chSeries:v=>{ V.chSeries=v; },
  chPages:v=>{ V.chPages=clamp(Number(v)||1,1,10); },
  chPaste:v=>{ const was=!!V.chPaste.trim(); V.chPaste=v; if(was!==!!v.trim()) render(); },
  chMin:v=>{ V.chMin=Math.max(0,Number(v)||0); render(); },
  chMinChars:v=>{ V.chMinChars=clamp(Number(v)||1,1,20); render(); },
  pSrc:v=>{ const was=!!V.pSrc.trim(); V.pSrc=v; if(was!==!!v.trim()) render(); },
  pNewName:v=>{ V.pNewName=v; },
  refQ:v=>{ V.modal.q=v; render(); }
};

const SEL={
  gmin:(v,d)=>mutate(()=>{ const g=G(d.id); g.min=+v; g.max=Math.max(+v,g.max); }),
  gmax:(v,d)=>mutate(()=>{ const g=G(d.id); g.max=+v; g.min=Math.min(+v,g.min); }),
  dbCat:v=>{ V.dbCat=v; render(); },
  dbTarget:v=>{ V.dbTarget=v; render(); },
  mGid:v=>mutate(()=>{
    const from=G(V.modal.gid);
    if(v===V.modal.gid) return;
    const t=from.tags.find(x=>x.id===V.modal.tid);
    from.tags=from.tags.filter(x=>x.id!==V.modal.tid);
    G(v).tags.push(t);
    V.modal.gid=v;
  })
};

/* ══════════ イベント ══════════ */
document.addEventListener("click",e=>{
  const el=e.target.closest("[data-act]");
  if(!el) return;
  e.preventDefault();
  const f=ACT[el.dataset.act];
  if(f) f(el.dataset,el,e);
});
document.addEventListener("input",e=>{
  const el=e.target.closest("[data-inp]");
  if(!el) return;
  if(el.dataset.inp==="file") return;
  const f=INP[el.dataset.inp];
  if(f) f(el.value,el.dataset,el);
});
document.addEventListener("change",e=>{
  const s=e.target.closest("[data-sel]");
  if(s){ const f=SEL[s.dataset.sel]; if(f) f(s.value,s.dataset); return; }
  const fi=e.target.closest('[data-inp="file"]');
  if(fi&&fi.files&&fi.files[0]){
    const fr=new FileReader();
    fr.onload=()=>{ V.impText=String(fr.result); ACT.restore(); };
    fr.readAsText(fi.files[0]);
    fi.value="";
  }
});
$("modal").addEventListener("click",e=>{ if(e.target.id==="modal"){ V.modal=null; render(); } });
window.addEventListener("error",e=>{
  if(!e||(!e.message&&!e.error)) return;   // 無関係なリソースエラーは無視
  const m=e.message||String(e.error);
  showErr(m+(e.lineno?` @${e.lineno}:${e.colno}`:""));
});
window.addEventListener("unhandledrejection",e=>{
  const r=e&&e.reason;
  showErr("Promise: "+((r&&r.message)||String(r)));
});

/* ══════════ 起動 ══════════ */
(function boot(){
  const raw=loadRaw();
  let fromStore=false;
  if(raw){ try{ D=JSON.parse(raw); fromStore=!!(D&&D.groups&&D.groups.length); }catch(e){ D=null; } }
  if(!fromStore) D=buildDefaults();
  D.settings={...DEFAULT_SETTINGS,...(D.settings||{})};
  D.rules=D.rules||[];
  D.history=D.history||[];
  D.groups.forEach(g=>{
    if(g.req===undefined) g.req=false;
    if(g.mode===undefined) g.mode="roll";
    if(g.setOn===undefined) g.setOn=false;
    if(g.char===undefined) g.char=false;
    if(g.look===undefined) g.look=false;
    g.tags.forEach(t=>{ if(t.fix===undefined) t.fix=false; });
  });
  V.fresh=!fromStore&&canStore===false?true:!fromStore;
  render();
})();
</script>
